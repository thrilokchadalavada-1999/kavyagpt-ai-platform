apiVersion: apps/v1
kind: Deployment

metadata:
  name: kavyagpt-backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:

    metadata:
      labels:
        app: backend

    spec:

      containers:
        - name: backend

          image: kavyagpt-backend

          imagePullPolicy: Never

          ports:
            - containerPort: 8000